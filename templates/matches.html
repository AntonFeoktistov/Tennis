<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Матчи</title>
</head>
<body>
    <h1>Таблица матчей</h1>

    <table border="1" cellpadding="8" cellspacing="0">
        <thead>
            <tr>
                <th>ID матча</th>
                <th>Игрок 1</th>
                <th>Игрок 2</th>
                <th>Победитель</th>
            </tr>
        </thead>
        <tbody>
            <!-- Здесь будут динамически подставляться строки из БД -->
            {% for match in matches %}
            <tr>
                <td>{{ match.id }}</td>
                <td>{{ match.player1.name }}</td>
                <td>{{ match.player2.name }}</td>
                <td>
                    {% if match.winner %}
                        {{ match.winner.name }}
                    {% else %}
                        —
                    {% endif %}
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    <ul>
        <li><a href="/newmatch">Начать новый матч</a></li>
        <li><a href="/">Главная</a></li>
    </ul>
</body>
</html>
