<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <title>Матчи</title>
</head>

<body>
    <h1>Таблица матчей</h1>

    <table border="1" cellpadding="8" cellspacing="0">
        <thead>
            <tr>
                <th>Игрок 1</th>
                <th>Игрок 2</th>
                <th>Победитель</th>
                <th>Действие</th>
            </tr>
        </thead>
        <tbody>
            {% for match in matches %}
            <tr>
                <td>{{ match.player1_name }}</td>
                <td>{{ match.player2_name }}</td>
                <td>{{ match.winner_name if match.winner_name else "не выявлен" }}</td>
                <td>
                    <a href="/match-score?uuid={{ match.uuid }}">Перейти к матчу</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

    <ul>
        <li><a href="/newmatch">Начать новый матч</a></li>
        <li><a href="/">Главная</a></li>
    </ul>
</body>

</html>
